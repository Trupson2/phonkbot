<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKCES HUB — Wybierz projekt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Inter',-apple-system,sans-serif;
    background:#0a0a12;
    color:#e2e8f0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* Animated background */
body::before{
    content:'';position:fixed;top:0;left:0;width:100%;height:100%;
    background:
        radial-gradient(ellipse 600px 400px at 25% 40%, rgba(143,245,255,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 500px 350px at 75% 55%, rgba(255,68,68,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 800px 600px at 50% 50%, rgba(99,102,241,0.02) 0%, transparent 60%);
    z-index:0;
    animation:bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse{
    0%{opacity:0.6;transform:scale(1)}
    100%{opacity:1;transform:scale(1.05)}
}

.launcher{position:relative;z-index:1;text-align:center;width:100%;max-width:900px;padding:30px}

/* Header */
.header{margin-bottom:50px}
.header-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.1rem;font-weight:700;
    text-transform:uppercase;letter-spacing:4px;
    color:#64748b;margin-bottom:8px;
}
.header-brand{
    font-family:'Space Grotesk',sans-serif;
    font-size:2.4rem;font-weight:900;
    color:#e2e8f0;letter-spacing:-0.02em;
    text-shadow:0 0 40px rgba(255,255,255,0.08);
}
.header-sub{font-size:0.8rem;color:#475569;margin-top:8px}

/* Project cards grid */
.projects{display:grid;grid-template-columns:1fr 1fr;gap:24px}

.project-card{
    position:relative;
    background:rgba(15,15,28,0.7);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:2px solid rgba(255,255,255,0.06);
    border-radius:24px;
    padding:40px 30px;
    text-decoration:none;color:#fff;
    transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow:hidden;
    cursor:pointer;
}
.project-card::before{
    content:'';position:absolute;top:0;left:0;right:0;bottom:0;
    border-radius:24px;opacity:0;transition:opacity 0.35s;
}
.project-card:hover{
    transform:translateY(-6px);
    border-color:var(--accent);
    box-shadow:0 20px 60px var(--shadow);
}
.project-card:hover::before{opacity:1}
.project-card:active{transform:translateY(-2px) scale(0.98)}

/* AKCES HUB card */
.card-akces{--accent:rgba(143,245,255,0.4);--shadow:rgba(143,245,255,0.12)}
.card-akces::before{background:radial-gradient(ellipse at center,rgba(143,245,255,0.06),transparent 70%)}
.card-akces .card-icon{background:rgba(143,245,255,0.1);border:1px solid rgba(143,245,255,0.15)}
.card-akces .card-icon span{color:#8ff5ff}
.card-akces .card-name{color:#8ff5ff}

/* PhonkBot card */
.card-phonk{--accent:rgba(255,68,68,0.4);--shadow:rgba(255,68,68,0.12)}
.card-phonk::before{background:radial-gradient(ellipse at center,rgba(255,68,68,0.06),transparent 70%)}
.card-phonk .card-icon{background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.15)}
.card-phonk .card-icon span{color:#ff4444}
.card-phonk .card-name{color:#ff4444}

.card-icon{
    width:72px;height:72px;border-radius:18px;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 20px;
    transition:transform 0.35s,box-shadow 0.35s;
}
.project-card:hover .card-icon{
    transform:scale(1.1);
    box-shadow:0 0 30px var(--shadow);
}
.card-icon span{font-size:2.2rem}

.card-name{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.6rem;font-weight:800;
    letter-spacing:-0.01em;
    margin-bottom:8px;
    text-shadow:0 0 20px var(--shadow);
}
.card-desc{font-size:0.85rem;color:#94a3b8;line-height:1.5;margin-bottom:16px}

.card-status{
    display:flex;align-items:center;justify-content:center;gap:8px;
    font-size:0.75rem;color:#64748b;
    padding-top:16px;border-top:1px solid rgba(255,255,255,0.05);
}
.card-dot{
    width:8px;height:8px;border-radius:50%;
    animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Footer */
.footer{
    position:fixed;bottom:20px;
    font-size:0.7rem;color:#334155;
    letter-spacing:1px;
}

/* Responsive */
@media(max-width:700px){
    .projects{grid-template-columns:1fr;max-width:400px;margin:0 auto}
    .header-brand{font-size:1.8rem}
}
</style>
</head>
<body>
    <div class="launcher">
        <div class="header">
            <div class="header-title">Wybierz projekt</div>
            <div class="header-brand">AKCES ENTERPRISE</div>
            <div class="header-sub">Raspberry Pi 5 &middot; {{ version }}</div>
        </div>

        <div class="projects">
            <!-- AKCES HUB -->
            <a href="/?project=akces&kiosk={{ kiosk }}" class="project-card card-akces">
                <div class="card-icon">
                    <span class="material-symbols-outlined">inventory_2</span>
                </div>
                <div class="card-name">AKCES HUB</div>
                <div class="card-desc">
                    Magazyn &middot; Paletomat &middot; Allegro<br>
                    Zarzadzanie paletami zwrotow
                </div>
                <div class="card-status">
                    <div class="card-dot" style="background:#8ff5ff;box-shadow:0 0 8px rgba(143,245,255,0.5)"></div>
                    Port 5000 &middot; Active
                </div>
            </a>

            <!-- PhonkBot -->
            <a href="http://localhost:5001/" class="project-card card-phonk">
                <div class="card-icon">
                    <span class="material-symbols-outlined">music_note</span>
                </div>
                <div class="card-name">PHONKBOT</div>
                <div class="card-desc">
                    AI Music Generator &middot; YouTube<br>
                    Suno &rarr; Telegram Review &rarr; Publish
                </div>
                <div class="card-status">
                    <div class="card-dot" style="background:#ff4444;box-shadow:0 0 8px rgba(255,68,68,0.5)"></div>
                    Port 5001 &middot; Active
                </div>
            </a>
        </div>
    </div>

    <div class="footer">AKCES ENTERPRISE &copy; 2026</div>
</body>
</html>
